name: repro
on:
  pull_request:
jobs:
  reusable-plain:
    uses: ./.github/workflows/reusable.yml
    with: { tag: plain }
  reusable-secret:
    uses: ./.github/workflows/reusable.yml
    with: { tag: secret }
    secrets:
      TOK: ${{ secrets.NONEXISTENT_SECRET }}
  reusable-matrix:
    strategy:
      fail-fast: false
      matrix: { x: [1, 2] }
    uses: ./.github/workflows/reusable.yml
    with: { tag: matrix-${{ matrix.x }} }
  composite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/comp
        with: { tag: composite, tok: ${{ secrets.NONEXISTENT_SECRET }} }
  gate:
    if: ${{ always() }}
    needs: [reusable-plain, reusable-secret, reusable-matrix, composite]
    runs-on: ubuntu-latest
    steps:
      - name: Dump needs
        shell: bash
        run: |
          echo '${{ toJSON(needs) }}'
          echo "contains-failure=${{ contains(needs.*.result, 'failure') }}"
          echo "contains-cancelled=${{ contains(needs.*.result, 'cancelled') }}"
