name: repro
on:
  pull_request:
jobs:
  reusable-plain:
    uses: ./.github/workflows/reusable.yml
    with:
      tag: plain
  reusable-secret:
    uses: ./.github/workflows/reusable.yml
    with:
      tag: secret
    secrets:
      TOK: ${{ secrets.NONEXISTENT_SECRET }}
  reusable-matrix:
    strategy:
      fail-fast: false
      matrix:
        x: [1, 2]
    uses: ./.github/workflows/reusable.yml
    with:
      tag: matrix
  reusable-garnet:
    uses: ./.github/workflows/reusable-garnet.yml
    secrets:
      TOK: ${{ secrets.NONEXISTENT_SECRET }}
  reusable-matrix-excludes:
    strategy:
      fail-fast: false
      matrix:
        node: ['22', '24', '26']
        platform: [ubuntu-latest, windows-latest]
        exclude:
          - node: '24'
            platform: ubuntu-latest
          - node: ${{ (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')) && 'none' || '24' }}
            platform: windows-latest
          - node: ${{ (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')) && 'none' || '26' }}
            platform: windows-latest
    uses: ./.github/workflows/reusable.yml
    with:
      tag: mx-${{ matrix.node }}
  composite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/comp
        with:
          tag: composite
          tok: ${{ secrets.NONEXISTENT_SECRET }}
  gate:
    if: ${{ always() }}
    needs:
      - reusable-plain
      - reusable-secret
      - reusable-matrix
      - reusable-garnet
      - reusable-matrix-excludes
      - composite
    runs-on: ubuntu-latest
    steps:
      - name: Dump needs
        shell: bash
        run: |
          echo '${{ toJSON(needs) }}'
          echo "contains-failure=${{ contains(needs.*.result, 'failure') }}"
          echo "contains-cancelled=${{ contains(needs.*.result, 'cancelled') }}"
